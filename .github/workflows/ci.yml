name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build winhttp.dll
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\build.ps1 -Clean
          if (-not (Test-Path .\build\winhttp.dll)) {
            throw "build\\winhttp.dll was not produced."
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: winhttp-dll
          path: build/winhttp.dll
          if-no-files-found: error
          retention-days: 14
