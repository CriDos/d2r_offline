name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build winhttp.dll
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\build.ps1 -Clean
          if (-not (Test-Path .\build\winhttp.dll)) {
            throw "build\\winhttp.dll was not produced."
          }

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $rawTag = "${{ github.event.inputs.tag }}"
          } else {
            $rawTag = "${{ github.ref_name }}"
          }

          $tag = $rawTag.Trim()
          if ($tag.StartsWith("refs/tags/")) {
            $tag = $tag.Substring("refs/tags/".Length)
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is empty."
          }

          if (-not $tag.StartsWith("v")) {
            if ($tag -match "^\d+(\.\d+){1,3}$") {
              $tag = "v$tag"
            } else {
              throw "Tag must be like v1.0.0 or 1.0.0."
            }
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=d2r_offline $tag" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: winhttp-dll-release
          path: build/winhttp.dll
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          files: build/winhttp.dll
          generate_release_notes: true
          fail_on_unmatched_files: true
